<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orvix Admin</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0c0e12;
      color: #e8eaf0;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0c0e12; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .panel { width: min(440px, 100%); border: 1px solid #2a2f3e; background: #13161c; border-radius: 8px; padding: 28px; }
    .dashboard { width: min(960px, 100%); }
    h1 { margin: 0 0 6px; font-size: 24px; font-weight: 650; }
    p { margin: 0; color: #9aa3b8; line-height: 1.5; }
    form { display: grid; gap: 14px; margin-top: 24px; }
    label { display: grid; gap: 7px; color: #cdd3df; font-size: 13px; }
    input { width: 100%; border: 1px solid #343b4d; background: #0c0e12; color: #e8eaf0; border-radius: 6px; padding: 11px 12px; font-size: 15px; }
    button { border: 0; border-radius: 6px; background: #4f7cff; color: white; padding: 11px 14px; font-weight: 650; cursor: pointer; }
    button.secondary { background: #222736; color: #e8eaf0; }
    button:disabled { opacity: .65; cursor: wait; }
    .error { margin-top: 14px; color: #fca5a5; min-height: 22px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-top: 24px; }
    .card { border: 1px solid #2a2f3e; background: #10131a; border-radius: 8px; padding: 18px; }
    .card strong { display: block; margin-top: 8px; font-size: 20px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <section id="login-panel" class="panel">
      <h1>Orvix Admin</h1>
      <p>Sign in with the installer admin credentials.</p>
      <form id="login-form">
        <label>Email
          <input id="email" name="email" type="email" autocomplete="username" required>
        </label>
        <label>Password
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button id="login-button" type="submit">Sign In</button>
      </form>
      <div id="login-error" class="error" role="alert"></div>
    </section>

    <section id="dashboard-panel" class="panel dashboard hidden">
      <div class="topbar">
        <div>
          <h1>Dashboard</h1>
          <p id="identity">Signed in</p>
        </div>
        <button class="secondary" id="logout-button" type="button">Sign Out</button>
      </div>
      <div class="grid">
        <div class="card"><span>API Health</span><strong id="health-status">Checking</strong></div>
        <div class="card"><span>Admin API</span><strong>Connected</strong></div>
        <div class="card"><span>CoreMail</span><strong>Runtime Enabled</strong></div>
        <div class="card"><span>Queue</span><strong>Ready</strong></div>
      </div>
    </section>
  </main>

  <script>
    const loginPanel = document.getElementById("login-panel");
    const dashboardPanel = document.getElementById("dashboard-panel");
    const form = document.getElementById("login-form");
    const error = document.getElementById("login-error");
    const button = document.getElementById("login-button");
    const identity = document.getElementById("identity");
    const healthStatus = document.getElementById("health-status");
    const logout = document.getElementById("logout-button");

    function showDashboard(profile) {
      identity.textContent = `${profile.email} (${profile.role})`;
      loginPanel.classList.add("hidden");
      dashboardPanel.classList.remove("hidden");
      fetch("/api/v1/health").then(r => {
        healthStatus.textContent = r.ok ? "OK" : "Error";
      }).catch(() => healthStatus.textContent = "Error");
    }

    async function loadProfile(token) {
      const res = await fetch("/api/v1/me", {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (!res.ok) throw new Error("profile check failed");
      return await res.json();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      button.disabled = true;
      try {
        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        };
        const res = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("invalid credentials");
        const data = await res.json();
        if (!data.access_token) throw new Error("login did not return an access token");
        sessionStorage.setItem("orvix_access_token", data.access_token);
        showDashboard(await loadProfile(data.access_token));
      } catch (err) {
        error.textContent = err.message || "login failed";
      } finally {
        button.disabled = false;
      }
    });

    logout.addEventListener("click", () => {
      sessionStorage.removeItem("orvix_access_token");
      dashboardPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    });

    const existing = sessionStorage.getItem("orvix_access_token");
    if (existing) {
      loadProfile(existing).then(showDashboard).catch(() => sessionStorage.removeItem("orvix_access_token"));
    }
  </script>
</body>
</html>
