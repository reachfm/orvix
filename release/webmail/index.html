<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0e1116" />
  <title>Orvix Webmail</title>
  <!-- Auth gate runs first; it probes
       /api/v1/webmail/session to decide between the login
       form (no session), the "no mailbox" card (session
       but no mailbox row), or the SPA itself
       (session + mailbox). The two scripts are loaded
       with `defer` so they execute in document order. -->
  <link rel="stylesheet" href="/assets/auth-gate.css" />
  <link rel="stylesheet" href="/assets/webmail.css" />
</head>
<body>
  <!-- The shell is rendered by webmail.js so the markup stays in
       one place. If JS fails to load, the user sees the auth-gate
       fallback below, which keeps the gate message accessible
       without JavaScript. -->
  <noscript>
    <div style="padding:24px;font-family:system-ui;color:#d6dbe6;background:#0e1116;">
      Orvix Webmail requires JavaScript. Please enable JavaScript
      and reload this page.
    </div>
  </noscript>
  <!-- The auth-gate overlays its UI on top of <body> if the
       session check fails. webmail.js replaces the shell itself
       (innerHTML on body) once init() runs. webmail-push.js
       is loaded after webmail.js so it can hook init() via
       window.OrvixWebmailPush.onInit(). The push module is a
       no-op on browsers without Web Push support, so it is safe
       to ship unconditionally. -->
  <script defer src="/assets/auth-gate.js"></script>
  <script defer src="/assets/webmail.js"></script>
  <script defer src="/assets/webmail-push.js"></script>
</body>
</html>
