<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Orvix Webmail - Professional Email Client" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Orvix Webmail</title>
    <!--
      Auth gate. Loaded BEFORE the webmail client so the
      gate can confirm /api/v1/me returns 200 before any UI
      is rendered. The webmail client itself then talks to
      /api/v1/webmail/* to read the user's real mailbox.
    -->
    <link rel="stylesheet" href="/webmail/assets/auth-gate.css">
    <link rel="stylesheet" href="/webmail/assets/webmail.css">
    <script src="/webmail/assets/auth-gate.js" defer></script>
    <script src="/webmail/assets/webmail.js" defer></script>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
