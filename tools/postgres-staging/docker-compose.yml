version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: orvix-pg-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: orvix
      POSTGRES_USER: orvix
      POSTGRES_PASSWORD: local_orvix_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orvix -d orvix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
