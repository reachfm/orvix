name: PostgreSQL Readiness

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - db/postgres-final-closure

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-readiness:
    name: PostgreSQL metadata runtime and migration gates
    # Pinned to ubuntu-24.04 (ships postgresql-client-16) so pg_dump/pg_restore
    # match the postgres:16 service below. `ubuntu-latest` rolled to 24.04->26.04
    # (postgresql-client-18), and a client newer than the v16 server emits GUCs
    # such as `transaction_timeout` that the v16 server rejects on restore,
    # breaking TestPostgresBackupRestoreAndRuntime. See the version assertion in
    # "Install PostgreSQL client tools".
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orvix
          POSTGRES_PASSWORD: ci_orvix_only
          POSTGRES_DB: orvix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ORVIX_DB_DRIVER: postgres
      ORVIX_DB_DSN: host=localhost port=5432 user=orvix password=ci_orvix_only dbname=orvix sslmode=disable
      ORVIX_RUN_POSTGRES_SCHEMA_TEST: 1
      ORVIX_RUN_POSTGRES_DML_TEST: 1
      ORVIX_RUN_POSTGRES_MIGRATE_TEST: 1
      ORVIX_RUN_POSTGRES_BACKUP_TEST: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client tools
        run: |
          set -euo pipefail
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          pg_dump --version
          pg_restore --version
          # Guard: pg_dump/pg_restore MUST match the postgres service major
          # (16). A newer client against the v16 server produces newer
          # archive/GUC output the server rejects on restore (e.g.
          # transaction_timeout), which silently breaks
          # TestPostgresBackupRestoreAndRuntime. Fail loudly if the runner
          # image ever drifts the client version again.
          client_major="$(pg_dump --version | grep -oE '[0-9]+' | head -1)"
          if [ "$client_major" != "16" ]; then
            echo "ERROR: pg_dump major ${client_major} != postgres service major 16." >&2
            echo "Client/server version mismatch will break backup/restore integration tests." >&2
            echo "Pin the runner (runs-on) or install postgresql-client-16 explicitly." >&2
            exit 1
          fi

      - name: Download Go modules
        run: |
          set -euo pipefail
          go mod download

      - name: Verify gofmt on changed files
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/main...HEAD -- '*.go' || true)
          if [ -z "$changed" ]; then
            echo "No Go files changed."
            exit 0
          fi
          unformatted=$(gofmt -l $changed)
          if [ -n "$unformatted" ]; then
            echo "The following changed Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: |
          set -euo pipefail
          go vet ./...

      - name: go build
        run: |
          set -euo pipefail
          go build ./...

      - name: Full suite (parallel)
        run: |
          set -euo pipefail
          go test -count=1 ./... -timeout=1200s

      - name: Full suite (sequential)
        run: |
          set -euo pipefail
          go test -p 1 -count=1 ./... -timeout=1200s

      - name: PostgreSQL runtime, migration, and backup/restore tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=20m ./cmd/orvix -run "Postgres|Migration|Bootstrap|Startup|BackupRestore"

      - name: PostgreSQL schema smoke test
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=15m ./internal/models -run TestPostgresProductionSchemaCompat

      - name: PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=15m ./internal/trust ./internal/models -run "Postgres|DML"

      - name: Customer domain PostgreSQL tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/customerdomain -run "Postgres|SQLite"

      - name: Enterprise admin tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/admin/... -run "Test"

      - name: RBAC permission matrix tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/auth/rbac -run "Test"

      - name: Enterprise audit tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/audit -run "Test"

      - name: License verification tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/licensing -run "Test"

      - name: Backup encryption tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/backup -run "Test"

      - name: Webhook SSRF transport tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/monitoring -run "Webhook|SSRF|Rebinding"

      - name: Release integrity test
        run: |
          set -euo pipefail
          bash release/scripts/smoke-release-integrity.sh

      - name: Admin frontend typecheck and build
        working-directory: web/admin
        run: |
          set -euo pipefail
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Webmail frontend typecheck and build
        working-directory: web/webmail
        run: |
          set -euo pipefail
          npm ci
          npx tsc --noEmit
          npm run build

  outbound-delivery-race:
    name: Outbound delivery race detector
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: |
          set -euo pipefail
          go mod download

      - name: Outbound delivery race detector
        run: |
          set -euo pipefail
          go test -race -count=1 ./internal/coremail/delivery/... -timeout=600s
