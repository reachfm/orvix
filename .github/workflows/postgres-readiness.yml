name: PostgreSQL Readiness

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - db/postgres-final-closure

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-readiness:
    name: PostgreSQL metadata runtime and migration gates
    # Pinned to ubuntu-24.04. PostgreSQL client binaries are installed from the
    # official PostgreSQL apt repository (apt.postgresql.org) and called via
    # absolute path (/usr/lib/postgresql/16/bin/*) to guarantee major-version
    # alignment with the postgres:16 service container below.
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orvix
          POSTGRES_PASSWORD: ci_orvix_only
          POSTGRES_DB: orvix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ORVIX_DB_DRIVER: postgres
      ORVIX_DB_DSN: host=localhost port=5432 user=orvix password=ci_orvix_only dbname=orvix sslmode=disable
      ORVIX_RUN_POSTGRES_SCHEMA_TEST: 1
      ORVIX_RUN_POSTGRES_DML_TEST: 1
      ORVIX_RUN_POSTGRES_MIGRATE_TEST: 1
      ORVIX_RUN_POSTGRES_BACKUP_TEST: 1
      PG_MAJOR: 16

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client tools
        run: |
          set -euo pipefail

          PG_MAJOR="${PG_MAJOR:-16}"
          PG_BINDIR="/usr/lib/postgresql/${PG_MAJOR}/bin"
          PG_DUMP="${PG_BINDIR}/pg_dump"
          PG_RESTORE="${PG_BINDIR}/pg_restore"
          PSQL="${PG_BINDIR}/psql"

          # Install the official PostgreSQL apt repository to get deterministic
          # client binaries that match our service container major.
          sudo apt-get update -o Acquire::Retries=3 -qq
          sudo apt-get install -y --no-install-recommends -qq curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo sh -c "echo 'deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main' \
            > /etc/apt/sources.list.d/pgdg.list"
          sudo apt-get update -o Acquire::Retries=3 -qq
          sudo apt-get install -y --no-install-recommends -qq "postgresql-client-${PG_MAJOR}"

          # ---- Preflight checks (fail-closed) ----

          # 1. Every expected binary exists at the expected absolute path
          for bin in "${PG_DUMP}" "${PG_RESTORE}" "${PSQL}"; do
            if [ ! -x "${bin}" ]; then
              echo "ERROR: required binary not found or not executable: ${bin}" >&2
              exit 1
            fi
          done

          # 2. Print versions with path provenance
          echo "=== pg_dump ==="
          "${PG_DUMP}" --version
          echo "expected path: ${PG_DUMP}"
          echo "=== pg_restore ==="
          "${PG_RESTORE}" --version
          echo "expected path: ${PG_RESTORE}"
          echo "=== psql ==="
          "${PSQL}" --version
          echo "expected path: ${PSQL}"

          # 3. pg_dump major MUST match the service container major
          dump_version="$("${PG_DUMP}" --version | grep -oE '[0-9]+' | head -1)"
          if [ "${dump_version}" != "${PG_MAJOR}" ]; then
            echo "ERROR: pg_dump major ${dump_version} != expected ${PG_MAJOR}." >&2
            echo "Client/server version mismatch will break backup/restore tests." >&2
            exit 1
          fi

          # 4. pg_restore major MUST match
          restore_version="$("${PG_RESTORE}" --version | grep -oE '[0-9]+' | head -1)"
          if [ "${restore_version}" != "${PG_MAJOR}" ]; then
            echo "ERROR: pg_restore major ${restore_version} != expected ${PG_MAJOR}." >&2
            exit 1
          fi

          # 5. psql connectivity check – use PGPASSWORD to avoid password
          # prompt; the output is sanitised by GitHub Actions (***).
          PGPASSWORD=ci_orvix_only "${PSQL}" -h localhost -p 5432 -U orvix -d orvix \
            -c "SELECT version();" 2>&1

          # 6. Prepend versioned binary directory to PATH so all subsequent
          # Go test steps (which call exec.LookPath("pg_dump") etc.) resolve
          # the correct versioned binary first.
          echo "${PG_BINDIR}" >> "${GITHUB_PATH}"
          export PATH="${PG_BINDIR}:${PATH}"

          # 7. Verify the resolved binary is our expected one, not a distro shim
          for name in pg_dump pg_restore psql; do
            resolved="$(command -v "${name}")"
            expected="${PG_BINDIR}/${name}"
            if [ "${resolved}" != "${expected}" ]; then
              echo "ERROR: ${name} resolves to ${resolved}, expected ${expected}" >&2
              echo "There is a conflicting package ahead in PATH." >&2
              exit 1
            fi
          done

          echo "=== PostgreSQL client preflight checks PASSED ==="

      - name: Download Go modules
        run: |
          set -euo pipefail
          go mod download

      - name: Verify gofmt on changed files
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/main...HEAD -- '*.go' || true)
          if [ -z "$changed" ]; then
            echo "No Go files changed."
            exit 0
          fi
          unformatted=$(gofmt -l $changed)
          if [ -n "$unformatted" ]; then
            echo "The following changed Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: |
          set -euo pipefail
          go vet ./...

      - name: go build
        run: |
          set -euo pipefail
          go build ./...

      - name: Full suite (parallel)
        run: |
          set -euo pipefail
          go test -count=1 ./... -timeout=1200s

      - name: Full suite (sequential)
        run: |
          set -euo pipefail
          go test -p 1 -count=1 ./... -timeout=1200s

      - name: PostgreSQL runtime, migration, and backup/restore tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=20m ./cmd/orvix -run "Postgres|Migration|Bootstrap|Startup|BackupRestore"

      - name: PostgreSQL schema smoke test
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=15m ./internal/models -run TestPostgresProductionSchemaCompat

      - name: PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=15m ./internal/trust ./internal/models -run "Postgres|DML"

      - name: Customer domain PostgreSQL tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/customerdomain -run "Postgres|SQLite"

      - name: Enterprise admin tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/admin/... -run "Test"

      - name: RBAC permission matrix tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/auth/rbac -run "Test"

      - name: Enterprise audit tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/audit -run "Test"

      - name: License verification tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/licensing -run "Test"

      - name: Backup encryption tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/backup -run "Test"

      - name: Webhook SSRF transport tests
        run: |
          set -euo pipefail
          go test -v -count=1 -timeout=600s ./internal/monitoring -run "Webhook|SSRF|Rebinding"

      - name: Release integrity test
        run: |
          set -euo pipefail
          bash release/scripts/smoke-release-integrity.sh

      - name: Admin frontend typecheck and build
        working-directory: web/admin
        run: |
          set -euo pipefail
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Webmail frontend typecheck and build
        working-directory: web/webmail
        run: |
          set -euo pipefail
          npm ci
          npx tsc --noEmit
          npm run build

  outbound-delivery-race:
    name: Outbound delivery race detector
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: |
          set -euo pipefail
          go mod download

      - name: Outbound delivery race detector
        run: |
          set -euo pipefail
          go test -race -count=1 ./internal/coremail/delivery/... -timeout=600s
