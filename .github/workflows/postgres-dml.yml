name: PostgreSQL Runtime DML

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-dml:
    name: PostgreSQL DML integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orvix
          POSTGRES_PASSWORD: ci_orvix_only
          POSTGRES_DB: orvix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ORVIX_RUN_POSTGRES_DML_TEST: 1
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: orvix
      PGPASSWORD: ci_orvix_only
      PGDATABASE: orvix

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends postgresql-client-16

      - name: Verify PostgreSQL connectivity
        run: |
          set -euo pipefail
          psql -c "SELECT version()"
          psql -c "SELECT 1"

      - name: Billing PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test ./internal/billing/... -count=1 -timeout 120s -v

      - name: Subscription lifecycle PostgreSQL tests (single-row-per-tenant invariant)
        run: |
          set -euo pipefail
          out="$(mktemp)"
          go test ./internal/billing -run TestSubscriptionLifecycle -count=1 -timeout 120s -v | tee "$out"
          for name in \
            TestSubscriptionLifecycle_NoSubscriptionCreatesOneActive \
            TestSubscriptionLifecycle_ExistingActiveNotDuplicated \
            TestSubscriptionLifecycle_NonTerminalStatusesNotOverwritten \
            TestSubscriptionLifecycle_CancelledIsReactivatedDeterministically \
            TestSubscriptionLifecycle_ExpiredIsReactivatedDeterministically \
            TestSubscriptionLifecycle_RepeatedCallsStayAtOneRow \
            TestSubscriptionLifecycle_ConcurrentCallsNoDuplicateRows \
            TestSubscriptionLifecycle_UniqueIndexRejectsDirectDuplicateInsert; do
            grep -q -- "--- PASS: ${name}" "$out" || { echo "missing PASS for ${name} against PostgreSQL" >&2; exit 1; }
          done

      - name: Abuse PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test ./internal/abuse/... -count=1 -timeout 120s -v

      - name: Auth (API-key rotation + session/JWT revocation) PostgreSQL tests
        run: |
          set -euo pipefail
          out="$(mktemp)"
          go test ./internal/auth -run "TestRotateByID_PostgreSQL|TestSessionRevocation_PostgreSQL" -count=1 -timeout 180s -v | tee "$out"
          if grep -q -- "--- SKIP: TestRotateByID_PostgreSQL" "$out" || grep -q -- "--- SKIP: TestSessionRevocation_PostgreSQL" "$out"; then
            echo "PostgreSQL auth tests skipped; PG environment is not wired correctly" >&2
            exit 1
          fi
          grep -q -- "--- PASS: TestRotateByID_PostgreSQL" "$out"
          grep -q -- "--- PASS: TestSessionRevocation_PostgreSQL" "$out"

      - name: Signup transaction PostgreSQL tests
        run: |
          set -euo pipefail
          out="$(mktemp)"
          go test ./internal/api/handlers -run "TestSignupTransactionPostgres" -count=1 -timeout 300s -v | tee "$out"
          if grep -q -- "--- SKIP: TestSignupTransactionPostgres" "$out"; then
            echo "PostgreSQL signup transaction tests skipped; PG environment is not wired correctly" >&2
            exit 1
          fi
          grep -q -- "--- PASS: TestSignupTransactionPostgresMaxOpenConnsOneNoDeadlock" "$out"
          grep -q -- "--- PASS: TestSignupTransactionPostgresSubscriptionFailureRollsBackTenantAndUser" "$out"

      - name: Bootstrap admin subscription self-heal PostgreSQL tests
        run: |
          set -euo pipefail
          out="$(mktemp)"
          go test ./cmd/orvix -run TestFreshInstall_.*Subscription -count=1 -timeout 180s -v | tee "$out"
          for name in \
            TestFreshInstall_AdminTenantHasActiveSubscription \
            TestFreshInstall_AdminMailboxSendIsEnforcerAllowed \
            TestFreshInstall_SelfHealsSubscriptionForAlreadyBootstrappedTenant; do
            grep -q -- "--- PASS: ${name}" "$out" || { echo "missing PASS for ${name} against PostgreSQL" >&2; exit 1; }
          done
