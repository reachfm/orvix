name: PostgreSQL Runtime DML

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-dml:
    name: PostgreSQL DML integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orvix
          POSTGRES_PASSWORD: ci_orvix_only
          POSTGRES_DB: orvix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ORVIX_RUN_POSTGRES_DML_TEST: 1
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: orvix
      PGPASSWORD: ci_orvix_only
      PGDATABASE: orvix

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends postgresql-client-16

      - name: Create test database and user
        run: |
          set -euo pipefail
          PGHOST=localhost PGPORT=5432 PGUSER=postgres psql -c \
            "SELECT 'CREATE DATABASE orvix' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'orvix')\gexec"
          PGHOST=localhost PGPORT=5432 PGUSER=postgres psql -c \
            "SELECT 'CREATE USER orvix WITH PASSWORD ''ci_orvix_only''' WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'orvix')\gexec"

      - name: Billing PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test ./internal/billing/... -count=1 -timeout 120s -v

      - name: Abuse PostgreSQL DML tests
        run: |
          set -euo pipefail
          go test ./internal/abuse/... -count=1 -timeout 120s -v

      - name: Check for SQLite-only syntax in DML code
        run: |
          set -euo pipefail
          if grep -rn --include='*.go' -Pi '\bAUTOINCREMENT\b|\bDATETIME\b|datetime\('\''now'\''\)' internal/billing internal/abuse; then
            echo "FAIL: SQLite-only syntax detected in PostgreSQL-targeted DML code" >&2
            exit 1
          fi
          echo "No SQLite-only syntax detected"
