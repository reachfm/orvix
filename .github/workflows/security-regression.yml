name: Security Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security regression gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Auth and tenant isolation tests
        run: |
          set -euo pipefail
          go test ./internal/auth/... -v -count=1 -timeout 60s
          go test ./internal/admin/organization/... -v -count=1 -timeout 60s
          echo "SECURITY_REGRESSION=PASS" >> "$GITHUB_ENV"
