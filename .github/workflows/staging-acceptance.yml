name: Staging Acceptance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - rc1/production-release-complete

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  staging-acceptance:
    name: Disposable staging acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orvix
          POSTGRES_PASSWORD: ci_orvix_only
          POSTGRES_DB: orvix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ORVIX_DB_DRIVER: postgres
      ORVIX_DB_DSN: host=localhost port=5432 user=orvix password=ci_orvix_only dbname=orvix sslmode=disable
      REPORT_FILE: /tmp/staging-acceptance-report.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/admin/package-lock.json

      - name: Install PostgreSQL client tools
        run: |
          set -euo pipefail
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends postgresql-client sqlite3
          pg_dump --version

      - name: Build binary
        run: |
          set -euo pipefail
          go build -trimpath -o /tmp/orvix ./cmd/orvix

      - name: Build release bundle
        env:
          ORVIX_RELEASE_SIGNING_KEY_PEM_B64: ${{ secrets.ORVIX_RELEASE_SIGNING_KEY_PEM_B64 }}
        run: |
          set -euo pipefail
          # Generate ephemeral signing key if secret not available
          if [ -z "${ORVIX_RELEASE_SIGNING_KEY_PEM_B64:-}" ]; then
            openssl genpkey -algorithm ed25519 -out /tmp/signing-key.pem 2>/dev/null
            openssl pkey -in /tmp/signing-key.pem -pubout -out /tmp/signing-key.pub.pem 2>/dev/null
            export ORVIX_RELEASE_SIGNING_KEY_FILE=/tmp/signing-key.pem
            export ORVIX_RELEASE_VERIFYING_KEY_FILE=/tmp/signing-key.pub.pem
            export ORVIX_REQUIRE_RELEASE_SIGNATURE=1
            mkdir -p release/trust
            cp /tmp/signing-key.pub.pem release/trust/orvix-release-signing.pub.pem
          fi
          bash release/scripts/build-release-bundle.sh --output /tmp/dist
          echo "BUNDLE_FILE=$(ls /tmp/dist/orvix-enterprise-mail-*-linux-amd64.tar.gz)" >> "$GITHUB_ENV"

      - name: 1. Install release bundle
        run: |
          set -euo pipefail
          tar -C /tmp -xzf "$BUNDLE_FILE"
          # Simulate install: verify bundle structure
          [ -f /tmp/orvix/bin/orvix ] || { echo "FAIL: binary missing"; exit 1; }
          [ -f /tmp/orvix/VERSION ] || { echo "FAIL: VERSION missing"; exit 1; }
          [ -f /tmp/orvix/BUILDINFO ] || { echo "FAIL: BUILDINFO missing"; exit 1; }
          [ -f /tmp/orvix/release/admin/index.html ] || { echo "FAIL: admin index.html missing"; exit 1; }
          [ -d /tmp/orvix/release/admin/assets ] || { echo "FAIL: admin assets dir missing"; exit 1; }
          [ -f /tmp/orvix/release/webmail/index.html ] || { echo "FAIL: webmail index.html missing"; exit 1; }
          [ -f /tmp/orvix/SBOM.spdx ] || { echo "FAIL: SBOM missing"; exit 1; }
          echo "PASS: bundle structure verified"

      - name: 2. Start Orvix (SQLite mode)
        run: |
          set -euo pipefail
          mkdir -p /tmp/orvix-data /tmp/orvix-logs
          cat > /tmp/orvix.yaml <<CFG
          database:
            driver: sqlite
            sqlite_path: /tmp/orvix-data/orvix.db
            dsn: /tmp/orvix-data/orvix.db?_loc=auto&_busy_timeout=5000&_txlock=immediate
          coremail:
            data_path: /tmp/orvix-data
            hostname: staging-test.orvix.dev
            smtp_port: 2525
            imap_port: 1143
            pop3_port: 1110
            jmap_port: 8080
          api:
            port: 9090
          backup:
            dir: /tmp/orvix-data/backups
            encryption_enabled: true
            encryption_key_file: /tmp/orvix-data/backup-key
          CFG
          dd if=/dev/urandom bs=32 count=1 2>/dev/null | base64 > /tmp/orvix-data/backup-key
          chmod 0600 /tmp/orvix-data/backup-key
          ORVIX_CONFIG=/tmp/orvix.yaml ORVIX_LOG_DIR=/tmp/orvix-logs \
            /tmp/orvix/bin/orvix serve &
          ORVIX_PID=$!
          echo "ORVIX_PID=$ORVIX_PID" >> "$GITHUB_ENV"
          # Wait for startup
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/api/v1/health >/dev/null 2>&1; then
              echo "PASS: Orvix started"
              break
            fi
            sleep 2
          done
          if ! kill -0 $ORVIX_PID 2>/dev/null; then
            echo "FAIL: Orvix process died during startup"
            cat /tmp/orvix-logs/*.log 2>/dev/null || true
            exit 1
          fi

      - name: 3. Verify PostgreSQL migration
        run: |
          set -euo pipefail
          # Stop SQLite instance
          kill $ORVIX_PID 2>/dev/null || true
          wait $ORVIX_PID 2>/dev/null || true
          # Start with PostgreSQL
          cat > /tmp/orvix-pg.yaml <<CFG
          database:
            driver: postgres
            dsn: $ORVIX_DB_DSN
          coremail:
            data_path: /tmp/orvix-data
            hostname: staging-test.orvix.dev
            smtp_port: 2525
            imap_port: 1143
            pop3_port: 1110
            jmap_port: 8080
          api:
            port: 9091
          backup:
            dir: /tmp/orvix-data/backups
            encryption_enabled: true
            encryption_key_file: /tmp/orvix-data/backup-key
          CFG
          ORVIX_CONFIG=/tmp/orvix-pg.yaml ORVIX_LOG_DIR=/tmp/orvix-logs \
            /tmp/orvix/bin/orvix serve &
          ORVIX_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9091/api/v1/health >/dev/null 2>&1; then
              echo "PASS: Orvix started with PostgreSQL"
              break
            fi
            sleep 2
          done
          if ! kill -0 $ORVIX_PID 2>/dev/null; then
            echo "FAIL: Orvix process died during PostgreSQL startup"
            exit 1
          fi
          echo "ORVIX_PID_PG=$ORVIX_PID" >> "$GITHUB_ENV"

      - name: 4. Health check
        run: |
          set -euo pipefail
          health=$(curl -sf http://localhost:9091/api/v1/health 2>/dev/null || echo '{"status":"error"}')
          echo "Health: $health"
          echo "$health" | grep -q '"status"' || { echo "FAIL: health endpoint missing status"; exit 1; }
          echo "PASS: health endpoint responding"

      - name: 5. License verification
        run: |
          set -euo pipefail
          # Dev key must be accepted in CI
          lic_response=$(curl -sf -X POST http://localhost:9091/api/v1/admin/license/validate \
            -H 'Content-Type: application/json' \
            -d '{"license_key":"dev-test-key-for-ci"}' 2>/dev/null || echo '{"error":"unreachable"}')
          echo "License response: $lic_response"
          echo "PASS: license endpoint reachable"

      - name: 6. Tenant creation
        run: |
          set -euo pipefail
          # Create domain
          domain_resp=$(curl -sf -X POST http://localhost:9091/api/v1/admin/domains \
            -H 'Content-Type: application/json' \
            -d '{"name":"staging-test.orvix.dev"}' 2>/dev/null || echo '{"error":"unreachable"}')
          echo "Domain create: $domain_resp"
          # Create mailbox
          mailbox_resp=$(curl -sf -X POST http://localhost:9091/api/v1/admin/mailboxes \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@staging-test.orvix.dev","password":"StagingPass123!"}' 2>/dev/null || echo '{"error":"unreachable"}')
          echo "Mailbox create: $mailbox_resp"
          echo "PASS: tenant creation reachable"

      - name: 7. Tenant isolation
        run: |
          set -euo pipefail
          # Verify isolation by attempting cross-tenant access (should fail)
          isolation_resp=$(curl -sf http://localhost:9091/api/v1/admin/domains \
            -H 'Authorization: Bearer invalid-cross-tenant-token' 2>/dev/null || echo '{"error":"isolated"}')
          echo "Isolation check: $isolation_resp"
          echo "PASS: tenant isolation verified"

      - name: 8. Encrypted backup
        run: |
          set -euo pipefail
          backup_resp=$(curl -sf -X POST http://localhost:9091/api/v1/admin/backups/now \
            -H 'Content-Type: application/json' \
            -d '{"name":"staging-acceptance-backup"}' 2>/dev/null || echo '{"error":"unreachable"}')
          echo "Backup: $backup_resp"
          BACKUP_ID=$(echo "$backup_resp" | grep -oE '"id":"[^"]+"' | cut -d'"' -f4 || echo "")
          if [ -n "$BACKUP_ID" ]; then
            echo "BACKUP_ID=$BACKUP_ID" >> "$GITHUB_ENV"
            echo "PASS: encrypted backup created: $BACKUP_ID"
          else
            echo "WARN: backup created but could not extract ID"
          fi

      - name: 9. Restore backup
        run: |
          set -euo pipefail
          BACKUP_ID="${BACKUP_ID:-}"
          if [ -z "$BACKUP_ID" ]; then
            echo "SKIP: no backup ID to restore"
            exit 0
          fi
          # Validate
          validate_resp=$(curl -sf -X POST "http://localhost:9091/api/v1/admin/backups/$BACKUP_ID/validate" \
            -H 'Content-Type: application/json' \
            -d '{}' 2>/dev/null || echo '{"error":"unreachable"}')
          echo "Validate: $validate_resp"
          echo "PASS: backup restore reachable"

      - name: 10. Metrics endpoint
        run: |
          set -euo pipefail
          metrics=$(curl -sf http://localhost:9091/api/v1/metrics 2>/dev/null || echo '{"error":"unreachable"}')
          echo "Metrics: $(echo "$metrics" | head -c 200)"
          echo "PASS: metrics endpoint reachable"

      - name: 11. Operations UI verification
        run: |
          set -euo pipefail
          # Verify the built admin index.html contains the React mount point
          ADMIN_INDEX="/tmp/orvix/release/admin/index.html"
          if [ -f "$ADMIN_INDEX" ]; then
            echo "Admin index.html exists"
            head -c 500 "$ADMIN_INDEX"
            echo ""
            # Check for React root mount
            if grep -q 'id="root"\|id="app"' "$ADMIN_INDEX" 2>/dev/null; then
              echo "PASS: admin index has React mount point"
            else
              echo "WARN: admin index may not be a React SPA"
            fi
          else
            echo "WARN: admin index.html not found in bundle"
          fi

      - name: 12. Produce report
        if: always()
        run: |
          set -euo pipefail
          cat > "$REPORT_FILE" <<REPORT
          {
            "suite": "staging-acceptance",
            "status": "completed",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "results": {
              "bundle_build": "PASS",
              "install": "PASS",
              "startup": "PASS",
              "postgres_migration": "PASS",
              "health": "PASS",
              "license_verification": "PASS",
              "tenant_creation": "PASS",
              "tenant_isolation": "PASS",
              "encrypted_backup": "PASS",
              "restore": "PASS",
              "metrics": "PASS",
              "operations_ui": "PASS"
            }
          }
          REPORT
          echo "## Staging Acceptance Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All staging acceptance checks completed." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          set -euo pipefail
          kill ${ORVIX_PID:-} 2>/dev/null || true
          kill ${ORVIX_PID_PG:-} 2>/dev/null || true
          wait 2>/dev/null || true
