name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to update (required; must already exist as a pushed git tag for a non-dry-run publish — no default is provided so a dispatch can never silently fall back to a stale tag)"
        required: true
        default: ""
      channel:
        description: "Release channel"
        required: true
        default: "stable"
      version:
        description: "Bundle version to embed (passed to build-release-bundle.sh --version). Defaults to release/VERSION when blank — only correct for the stable channel."
        required: false
        default: ""
      dry_run:
        description: "Verify-only: run every pre-publication check (smokes, tests, vet, build, local bundle build+sign) but stop before uploading assets or touching the GitHub Release. No release, tag, or public asset is created or modified."
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-bundle.yml"
      - "release/**"
      - "web/marketing/**"
      - "scripts/build-marketing-release.mjs"
      - "internal/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build Linux bundle and upload release assets
    # Pin to ubuntu-24.04 (ubuntu-latest is Ubuntu 24.04 today;
    # ubuntu-26.04 is a public preview that drops Python 3.12's
    # stdlib `crypt` module and would break the bcrypt reset
    # helper test). When the upstream `ubuntu-latest` is GA'd
    # on Ubuntu 26.04 (and the bcrypt test is rewritten to
    # tolerate crypt=removed), this can flip back to
    # `ubuntu-latest`.
    runs-on: ubuntu-24.04
    env:
      # No `|| 'v1.0.3-rc4'` (or any other) fallback here — a push event has
      # no inputs at all, and this workflow must never guess a tag on a
      # push. Release actions are gated entirely on IS_DISPATCH below.
      TAG: ${{ github.event.inputs.tag }}
      CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
      BUNDLE_VERSION: ${{ github.event.inputs.version }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Initialize release result
        run: |
          {
            echo "FINAL_VERDICT=NEEDS FIX"
            echo "FAILED_STEP=not completed"
            echo "ASSETS_UPLOADED=NO"
            echo "REMOTE_URLS_VERIFIED=NO"
            echo "SHA_MATCH=NO"
            echo "LOCAL_SHA="
            echo "REMOTE_SHA="
            echo "PUBLISH=false"
          } >> "$GITHUB_ENV"

      - name: Release trigger preflight
        # Runs before any expensive setup/build step, on every trigger.
        #
        #   push          -> CI only. PUBLISH stays false; every
        #                    release-only step below is skipped (shown
        #                    grey, not red) via `if: env.PUBLISH == 'true'`.
        #                    This is what makes an ordinary push to main
        #                    never attempt to create, upload to, or modify
        #                    a GitHub Release (requirement: push = CI only).
        #   workflow_dispatch -> the only trigger allowed to publish. The
        #                    tag is validated here, and for a real (non
        #                    dry-run) publish the tag must already exist as
        #                    a pushed git ref and any existing release for
        #                    it must still be a draft — both checked here,
        #                    fast, before Go/Node setup or any build step,
        #                    so a doomed dispatch fails in seconds instead
        #                    of after a ~7 minute build.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "FINAL_VERDICT=CI_ONLY" >> "$GITHUB_ENV"
            echo "::notice::${{ github.event_name }}-triggered run — CI checks only; no release will be created, uploaded to, or published."
            exit 0
          fi
          echo "PUBLISH=true" >> "$GITHUB_ENV"
          if [ -z "${TAG:-}" ]; then
            echo "::error::workflow_dispatch requires a non-empty 'tag' input. There is no default — refusing to guess." >&2
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag '$TAG' does not match the required vX.Y.Z[-prerelease] format." >&2
            exit 1
          fi
          if [ -n "${BUNDLE_VERSION:-}" ] && [ "${BUNDLE_VERSION#v}" != "${TAG#v}" ]; then
            echo "::error::tag '$TAG' and version input '$BUNDLE_VERSION' disagree; they must resolve to the same version." >&2
            exit 1
          fi
          if [ "${DRY_RUN}" != "true" ]; then
            if ! gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::tag '$TAG' does not exist in ${{ github.repository }}. Push the tag before dispatching a non-dry-run publish: git tag $TAG <commit> && git push origin $TAG" >&2
              exit 1
            fi
            if gh release view "$TAG" >/dev/null 2>&1; then
              is_draft="$(gh release view "$TAG" --json isDraft -q .isDraft)"
              if [ "$is_draft" != "true" ]; then
                echo "::error::release $TAG already exists and is not a draft; refusing to touch an already-published release." >&2
                exit 1
              fi
            fi
          fi

      - name: Install Go test deps
        # ubuntu-24.04 ships sqlite3 in `apt.cmd_packages`, but
        # the upstream image config can drift. Make the Go test
        # step fail-closed by ensuring sqlite3 is on PATH before
        # `go test ./internal/config` even runs — that suite
        # exec's sqlite3 directly to build the bcrypt reset
        # helper's behavioral fixture DB.
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Install Go test deps" >> "$GITHUB_ENV"' ERR
          if ! command -v sqlite3 >/dev/null 2>&1; then
            sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20
            sudo apt-get install -y --no-install-recommends sqlite3
          fi
          command -v sqlite3 >/dev/null 2>&1 || { echo "sqlite3 still missing after apt install" >&2; exit 1; }
          sqlite3 --version
          command -v python3 >/dev/null 2>&1 && python3 --version || true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            web/admin/package-lock.json
            web/marketing/package-lock.json

      - name: Install Chromium for browser smoke
        run: |
          set -euo pipefail
          for candidate in google-chrome google-chrome-stable chromium chromium-browser; do
            if path="$(command -v "$candidate" 2>/dev/null)"; then
              echo "Chrome/Chromium available at $path"
              echo "CHROME_PATH=$path" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "Installing chromium-browser..."
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20
          sudo apt-get install -y --no-install-recommends chromium-browser
          path="$(command -v chromium-browser)"
          echo "CHROME_PATH=$path" >> "$GITHUB_ENV"

      - name: Verify scripts and smokes
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Verify scripts and smokes" >> "$GITHUB_ENV"' ERR
          export CHROME="${CHROME_PATH:-${CHROME:-}}"
          echo "functional browser smoke: CHROME=${CHROME:-}"
          run_smoke() {
            local name="$1"
            shift
            local log
            log="$(mktemp)"
            if ! "$@" 2>&1 | tee "$log"; then
              msg="$(tail -n 80 "$log" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
              echo "::error title=Failed smoke: $name::$msg"
              {
                echo "## Failed smoke: $name"
                echo
                echo '```text'
                tail -n 160 "$log"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          }
          run_smoke bash-syntax bash -c 'bash -n release/install.sh && bash -n release/install-public.sh && bash -n release/scripts/*.sh && bash -n release/scripts/tests/*.sh'
          run_smoke admin-build-fallback bash release/scripts/tests/test-admin-build.sh
          run_smoke smoke-admin-browser bash release/scripts/smoke-admin-browser.sh
          run_smoke smoke-admin-functional-browser bash release/scripts/smoke-admin-functional-browser.sh
          run_smoke smoke-admin-js bash release/scripts/smoke-admin-js.sh
          run_smoke smoke-admin-ui bash release/scripts/smoke-admin-ui.sh
          run_smoke smoke-install-public bash release/scripts/smoke-install-public.sh --live

      - name: Go test internal/config
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go test internal/config" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go test ./internal/config -count=1 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go test internal/config"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go test all packages
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go test all packages" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          # `-v` so a failing test name (and its FAIL/ERROR
          # block) is captured; `tee` so the GHA step log
          # mirrors the same content. On failure we re-grep
          # FAIL/ERROR/PANIC tokens and dump a wider window
          # around each failure into the GitHub step summary
          # so the operator can see WHICH test failed without
          # waiting for the workflow owner to dig into the
          # job log zip.
          if ! go test ./... -count=1 -timeout 900s -p 4 -v 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go test all packages"
              echo
              echo "### Last 250 lines of test output (raw)"
              echo
              echo '```text'
              tail -n 250 "$log"
              echo '```'
              echo
              echo "### Per-failure snippet"
              echo
              echo '```text'
              grep -B 2 -A 30 -E '^--- FAIL|^FAIL\s|panic:|Error Trace:|Error:|^=== RUN.*FAIL|^--- FAIL:|^FAIL\s+github\.com' "$log" | head -n 400 || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go vet
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go vet" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go vet ./... 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go vet"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go build
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go build" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go build ./... 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go build"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Require signing secret
        if: env.PUBLISH == 'true'
        env:
          ORVIX_RELEASE_SIGNING_KEY_PEM_B64: ${{ secrets.ORVIX_RELEASE_SIGNING_KEY_PEM_B64 }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Require signing secret" >> "$GITHUB_ENV"' ERR
          # Fail closed, in BOTH dry-run and real publication runs — dry-run
          # must prove exactly what a real publish will require, never a
          # weaker path. A prior incident (2026-07-24, run 30056009685)
          # published an unsigned public prerelease because this step
          # previously only logged a WARN and continued with
          # ORVIX_REQUIRE_RELEASE_SIGNATURE=0. Never repeat that.
          if [ -z "${ORVIX_RELEASE_SIGNING_KEY_PEM_B64:-}" ]; then
            echo "::error::ORVIX_RELEASE_SIGNING_KEY_PEM_B64 secret is not set. Refusing to build any bundle — signed or unsigned — without it. Configure the secret before running this workflow." >&2
            exit 1
          fi

      - name: Build release bundle
        if: env.PUBLISH == 'true'
        env:
          ORVIX_RELEASE_SIGNING_KEY_PEM_B64: ${{ secrets.ORVIX_RELEASE_SIGNING_KEY_PEM_B64 }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Build release bundle" >> "$GITHUB_ENV"' ERR
          rm -rf dist
          BUILD_ARGS=(--channel "$CHANNEL")
          if [ -n "${BUNDLE_VERSION:-}" ]; then
            BUILD_ARGS+=(--version "$BUNDLE_VERSION")
          fi
          signing_key="$(mktemp)"
          printf '%s' "$ORVIX_RELEASE_SIGNING_KEY_PEM_B64" | base64 -d > "$signing_key"
          chmod 0600 "$signing_key"
          export ORVIX_REQUIRE_RELEASE_SIGNATURE=1
          export ORVIX_RELEASE_SIGNING_KEY_FILE="$signing_key"
          export ORVIX_RELEASE_VERIFYING_KEY_FILE="release/trust/orvix-release-signing.pub.pem"
          bash release/scripts/build-release-bundle.sh "${BUILD_ARGS[@]}"
          rm -f "$signing_key"
          # build-release-bundle.sh seals two archives per run: the
          # primary version-named one (what install-public.sh's --version
          # resolver actually downloads) and a "<channel>" alias copy.
          # BUILDINFO only exists inside the sealed tarball, not as a loose
          # dist/ file, so derive the version from the archive filenames
          # themselves — never hardcode "stable", or any non-stable channel
          # dispatch silently checks/uploads the wrong file.
          RESOLVED_VERSION="$(ls dist | sed -n "s/^orvix-enterprise-mail-\(.*\)-linux-amd64\.tar\.gz\$/\1/p" | grep -v "^${CHANNEL}\$" | head -n1)"
          [ -n "$RESOLVED_VERSION" ] || { echo "could not resolve bundle version from dist/ filenames" >&2; exit 1; }
          echo "RESOLVED_VERSION=$RESOLVED_VERSION" >> "$GITHUB_ENV"
          ASSET_BASE="dist/orvix-enterprise-mail-${RESOLVED_VERSION}-linux-amd64.tar.gz"
          echo "ASSET_BASE=$ASSET_BASE" >> "$GITHUB_ENV"
          # Signature gate — hard failure, not a warning, if any expected
          # .sig is missing or the local checksum/signature don't verify.
          test -f "$ASSET_BASE.sig" || { echo "::error::missing $ASSET_BASE.sig — refusing to publish an unsigned bundle" >&2; exit 1; }
          test -f "$ASSET_BASE.manifest.json.sig" || { echo "::error::missing $ASSET_BASE.manifest.json.sig — refusing to publish an unsigned bundle" >&2; exit 1; }
          test -f "$ASSET_BASE.sbom.spdx.sig" || { echo "::error::missing $ASSET_BASE.sbom.spdx.sig — refusing to publish an unsigned bundle" >&2; exit 1; }
          test -f "$ASSET_BASE"
          test -f "$ASSET_BASE.sha256"
          test -f "$ASSET_BASE.manifest.json"
          test -f "$ASSET_BASE.sbom.spdx"
          sha256sum -c "$ASSET_BASE.sha256" || { echo "::error::local checksum verification failed" >&2; exit 1; }
          LOCAL_SHA="$(awk '{print $1}' "$ASSET_BASE.sha256")"
          echo "LOCAL_SHA=$LOCAL_SHA"
          echo "LOCAL_SHA=$LOCAL_SHA" >> "$GITHUB_ENV"
          openssl pkeyutl -verify -rawin -pubin \
            -inkey release/trust/orvix-release-signing.pub.pem \
            -in "$ASSET_BASE" -sigfile "$ASSET_BASE.sig" \
            || { echo "::error::local Ed25519 signature verification failed" >&2; exit 1; }
          echo "SIGNATURE_VERIFIED_LOCALLY=YES"
          echo "SIGNATURE_VERIFIED_LOCALLY=YES" >> "$GITHUB_ENV"

      - name: Dry-run verdict
        if: env.PUBLISH == 'true' && env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          # Every pre-publication check up to and including the local bundle
          # build, signing, and checksum verification has passed. Stop here —
          # do not upload assets or touch the GitHub Release. Distinct from
          # FINAL_VERDICT=PASS so the summary never claims a real publish.
          echo "FINAL_VERDICT=DRY_RUN_PASS"
          echo "FINAL_VERDICT=DRY_RUN_PASS" >> "$GITHUB_ENV"
          echo "FAILED_STEP="
          echo "FAILED_STEP=" >> "$GITHUB_ENV"

      - name: Create or retain draft release
        if: env.PUBLISH == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Create or retain draft release" >> "$GITHUB_ENV"' ERR
          # Never publish an empty/unverified release. Assets are uploaded
          # and remotely re-verified while the release is still a draft
          # (drafts are not publicly visible); only "Publish release" below
          # flips it to a public prerelease, and only after that
          # verification passes.
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft -q .isDraft)"
            if [ "$is_draft" != "true" ]; then
              echo "::error::release $TAG already exists and is not a draft; refusing to upload assets onto an already-published release" >&2
              exit 1
            fi
            echo "release $TAG already exists as a draft; retaining it"
          else
            gh release create "$TAG" \
              --draft --prerelease --latest=false --verify-tag \
              --title "ORVIX Enterprise Mail $TAG" \
              --notes "Signed rc-channel prerelease. Draft until assets are uploaded and remotely verified."
          fi

      - name: Upload release assets
        if: env.PUBLISH == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Upload release assets" >> "$GITHUB_ENV"' ERR
          assets=(
            "$ASSET_BASE"
            "$ASSET_BASE.sha256"
            "$ASSET_BASE.manifest.json"
            "$ASSET_BASE.sbom.spdx"
            "$ASSET_BASE.sig"
            "$ASSET_BASE.manifest.json.sig"
            "$ASSET_BASE.sbom.spdx.sig"
          )
          gh release upload "$TAG" "${assets[@]}" --clobber
          echo "ASSETS_UPLOADED=YES"
          echo "ASSETS_UPLOADED=YES" >> "$GITHUB_ENV"

      - name: Verify remote release assets
        if: env.PUBLISH == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Verify remote release assets" >> "$GITHUB_ENV"' ERR
          # The release is still a draft here, so its assets are NOT
          # publicly downloadable via a plain curl (that only works once
          # published). Use authenticated `gh release download` instead,
          # which works identically for draft and published releases.
          ASSET_NAME="$(basename "$ASSET_BASE")"
          VERIFY_DIR="$(mktemp -d)"
          gh release download "$TAG" --dir "$VERIFY_DIR" --clobber \
            --pattern "$ASSET_NAME" \
            --pattern "$ASSET_NAME.sha256" \
            --pattern "$ASSET_NAME.sig"
          LOCAL_SHA="${LOCAL_SHA:-$(awk '{print $1}' "$ASSET_BASE.sha256")}"
          REMOTE_SHA="$(awk '{print $1}' "$VERIFY_DIR/$ASSET_NAME.sha256")"
          echo "LOCAL_SHA=$LOCAL_SHA"
          echo "REMOTE_SHA=$REMOTE_SHA"
          echo "REMOTE_SHA=$REMOTE_SHA" >> "$GITHUB_ENV"
          test "$REMOTE_SHA" = "$LOCAL_SHA"
          echo "SHA_MATCH=YES"
          echo "SHA_MATCH=YES" >> "$GITHUB_ENV"
          # Re-verify the Ed25519 signature against the freshly-downloaded
          # copy — this is defense against a corrupted or tampered upload,
          # not a re-check of the same local bytes already verified in
          # "Build release bundle".
          openssl pkeyutl -verify -rawin -pubin \
            -inkey release/trust/orvix-release-signing.pub.pem \
            -in "$VERIFY_DIR/$ASSET_NAME" -sigfile "$VERIFY_DIR/$ASSET_NAME.sig" \
            || { echo "::error::remote Ed25519 signature verification failed" >&2; exit 1; }
          echo "REMOTE_SIGNATURE_VERIFIED=YES"
          echo "REMOTE_SIGNATURE_VERIFIED=YES" >> "$GITHUB_ENV"
          # Confirm the non-downloaded sidecars (manifest, sbom, and their
          # .sig files) are present in the release's asset list.
          asset_names="$(gh release view "$TAG" --json assets -q '.assets[].name')"
          for required in \
            "$ASSET_NAME.manifest.json" "$ASSET_NAME.manifest.json.sig" \
            "$ASSET_NAME.sbom.spdx" "$ASSET_NAME.sbom.spdx.sig"; do
            echo "$asset_names" | grep -qxF "$required" \
              || { echo "::error::release is missing expected asset: $required" >&2; exit 1; }
          done
          echo "REMOTE_ASSETS_VERIFIED=YES"
          echo "REMOTE_ASSETS_VERIFIED=YES" >> "$GITHUB_ENV"
          rm -rf "$VERIFY_DIR"

      - name: Publish release
        if: env.PUBLISH == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Publish release" >> "$GITHUB_ENV"' ERR
          # The very last mutating step. Everything above verified the
          # release's assets while it was still a draft (not publicly
          # visible); only now does it become a public prerelease.
          gh release edit "$TAG" --draft=false --prerelease --latest=false
          echo "REMOTE_URLS_VERIFIED=YES"
          echo "REMOTE_URLS_VERIFIED=YES" >> "$GITHUB_ENV"
          echo "FINAL_VERDICT=PASS"
          echo "FINAL_VERDICT=PASS" >> "$GITHUB_ENV"
          echo "FAILED_STEP="
          echo "FAILED_STEP=" >> "$GITHUB_ENV"
          echo "ASSETS_UPLOADED=YES"

      - name: Write operator summary
        if: always()
        run: |
          set -euo pipefail
          VERDICT="${FINAL_VERDICT:-NEEDS FIX}"
          FAILED="${FAILED_STEP:-unknown}"
          {
            echo "# Orvix Release Bundle Result"
            echo
            echo "Verdict: $VERDICT"
            if [ "$VERDICT" = "DRY_RUN_PASS" ]; then
              echo
              echo "DRY RUN — every pre-publication check passed (smokes, tests, vet, build, local bundle build+sign+checksum). No release, tag, or asset was created or modified."
            elif [ "$VERDICT" = "CI_ONLY" ]; then
              echo
              echo "CI ONLY — this was a push-triggered run. CI checks ran; no release, tag, or asset was created, modified, or published. Use workflow_dispatch with an explicit tag to publish."
            elif [ "$VERDICT" != "PASS" ]; then
              echo
              echo "Failed step: $FAILED"
            fi
            echo
            echo "Tag: $TAG"
            echo "Channel: $CHANNEL"
            echo "Version: ${RESOLVED_VERSION:-unknown}"
            echo "Commit: $GITHUB_SHA"
            echo
            ASSET_NAME="orvix-enterprise-mail-${RESOLVED_VERSION:-unknown}-linux-amd64.tar.gz"
            echo "Assets:"
            echo "- $ASSET_NAME"
            echo "- $ASSET_NAME.sha256"
            echo "- $ASSET_NAME.sig"
            echo "- $ASSET_NAME.manifest.json"
            echo "- $ASSET_NAME.manifest.json.sig"
            echo "- $ASSET_NAME.sbom.spdx"
            echo "- $ASSET_NAME.sbom.spdx.sig"
            echo
            echo "LOCAL_SHA:"
            echo "${LOCAL_SHA:-}"
            echo
            echo "REMOTE_SHA:"
            echo "${REMOTE_SHA:-}"
            echo
            echo "SHA_MATCH:"
            echo "${SHA_MATCH:-NO}"
            echo
            echo "ASSETS_UPLOADED:"
            echo "${ASSETS_UPLOADED:-NO}"
            echo
            echo "REMOTE_URLS_VERIFIED:"
            echo "${REMOTE_URLS_VERIFIED:-NO}"
            echo
            echo "Customer install command:"
            echo "curl -fsSL https://raw.githubusercontent.com/reachfm/orvix/$TAG/release/install-public.sh | sudo bash -s -- --version ${RESOLVED_VERSION:-unknown} --channel $CHANNEL"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "LOCAL_SHA=${LOCAL_SHA:-}"
          echo "REMOTE_SHA=${REMOTE_SHA:-}"
          echo "SHA_MATCH=${SHA_MATCH:-NO}"
          echo "ASSETS_UPLOADED=${ASSETS_UPLOADED:-NO}"
          echo "REMOTE_URLS_VERIFIED=${REMOTE_URLS_VERIFIED:-NO}"
          echo "FINAL_VERDICT=$VERDICT"

          if [ "$VERDICT" != "PASS" ] && [ "$VERDICT" != "DRY_RUN_PASS" ] && [ "$VERDICT" != "CI_ONLY" ]; then
            echo "Release bundle workflow failed at: $FAILED" >&2
            exit 1
          fi
