name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to update"
        required: true
        default: "v1.0.3-rc4"
      channel:
        description: "Release channel"
        required: true
        default: "stable"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-bundle.yml"
      - "release/**"
      - "internal/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build Linux bundle and upload release assets
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || 'v1.0.3-rc4' }}
      CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize release result
        run: |
          {
            echo "FINAL_VERDICT=NEEDS FIX"
            echo "FAILED_STEP=not completed"
            echo "ASSETS_UPLOADED=NO"
            echo "REMOTE_URLS_VERIFIED=NO"
            echo "SHA_MATCH=NO"
            echo "LOCAL_SHA="
            echo "REMOTE_SHA="
          } >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify scripts and smokes
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Verify scripts and smokes" >> "$GITHUB_ENV"' ERR
          run_smoke() {
            local name="$1"
            shift
            local log
            log="$(mktemp)"
            if ! "$@" 2>&1 | tee "$log"; then
              {
                echo "## Failed smoke: $name"
                echo
                echo '```text'
                tail -n 160 "$log"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          }
          bash -n release/install.sh
          bash -n release/install-public.sh
          bash -n release/scripts/*.sh
          run_smoke smoke-admin-browser bash release/scripts/smoke-admin-browser.sh
          run_smoke smoke-admin-js bash release/scripts/smoke-admin-js.sh
          run_smoke smoke-admin-ui bash release/scripts/smoke-admin-ui.sh
          run_smoke smoke-install-public bash release/scripts/smoke-install-public.sh --live

      - name: Go test internal/config
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go test internal/config" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go test ./internal/config -count=1 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go test internal/config"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go test all packages
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go test all packages" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go test ./... -count=1 -timeout 900s -p 4 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go test all packages"
              echo
              echo '```text'
              tail -n 160 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go vet
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go vet" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go vet ./... 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go vet"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Go build
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Go build" >> "$GITHUB_ENV"' ERR
          log="$(mktemp)"
          if ! go build ./... 2>&1 | tee "$log"; then
            {
              echo "## Failed step: Go build"
              echo
              echo '```text'
              tail -n 120 "$log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build release bundle
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Build release bundle" >> "$GITHUB_ENV"' ERR
          rm -rf dist
          bash release/scripts/build-release-bundle.sh --channel "$CHANNEL"
          test -f dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz
          test -f dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256
          sha256sum -c dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256
          LOCAL_SHA="$(awk '{print $1}' dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256)"
          echo "LOCAL_SHA=$LOCAL_SHA"
          echo "LOCAL_SHA=$LOCAL_SHA" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Upload release assets" >> "$GITHUB_ENV"' ERR
          gh release upload "$TAG" \
            dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz \
            dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256 \
            --clobber
          echo "ASSETS_UPLOADED=YES"
          echo "ASSETS_UPLOADED=YES" >> "$GITHUB_ENV"

      - name: Verify remote release assets
        run: |
          set -euo pipefail
          trap 'echo "FAILED_STEP=Verify remote release assets" >> "$GITHUB_ENV"' ERR
          LOCAL_SHA="${LOCAL_SHA:-$(awk '{print $1}' dist/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256)}"
          REMOTE_SHA="$(curl -fsSL https://github.com/reachfm/orvix/releases/latest/download/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256 | awk '{print $1}')"
          echo "LOCAL_SHA=$LOCAL_SHA"
          echo "REMOTE_SHA=$REMOTE_SHA"
          echo "REMOTE_SHA=$REMOTE_SHA" >> "$GITHUB_ENV"
          test "$REMOTE_SHA" = "$LOCAL_SHA"
          echo "SHA_MATCH=YES"
          echo "SHA_MATCH=YES" >> "$GITHUB_ENV"
          curl -fIL https://github.com/reachfm/orvix/releases/latest/download/orvix-enterprise-mail-stable-linux-amd64.tar.gz
          curl -fIL https://github.com/reachfm/orvix/releases/latest/download/orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256
          echo "REMOTE_URLS_VERIFIED=YES"
          echo "REMOTE_URLS_VERIFIED=YES" >> "$GITHUB_ENV"
          echo "FINAL_VERDICT=PASS"
          echo "FINAL_VERDICT=PASS" >> "$GITHUB_ENV"
          echo "FAILED_STEP="
          echo "FAILED_STEP=" >> "$GITHUB_ENV"
          echo "ASSETS_UPLOADED=YES"
          echo "REMOTE_URLS_VERIFIED=YES"
          echo "FINAL_VERDICT=PASS"

      - name: Write operator summary
        if: always()
        run: |
          set -euo pipefail
          VERDICT="${FINAL_VERDICT:-NEEDS FIX}"
          FAILED="${FAILED_STEP:-unknown}"
          {
            echo "# Orvix Release Bundle Result"
            echo
            echo "Verdict: $VERDICT"
            if [ "$VERDICT" != "PASS" ]; then
              echo
              echo "Failed step: $FAILED"
            fi
            echo
            echo "Tag: $TAG"
            echo "Channel: $CHANNEL"
            echo "Commit: $GITHUB_SHA"
            echo
            echo "Assets:"
            echo "- orvix-enterprise-mail-stable-linux-amd64.tar.gz"
            echo "- orvix-enterprise-mail-stable-linux-amd64.tar.gz.sha256"
            echo
            echo "LOCAL_SHA:"
            echo "${LOCAL_SHA:-}"
            echo
            echo "REMOTE_SHA:"
            echo "${REMOTE_SHA:-}"
            echo
            echo "SHA_MATCH:"
            echo "${SHA_MATCH:-NO}"
            echo
            echo "ASSETS_UPLOADED:"
            echo "${ASSETS_UPLOADED:-NO}"
            echo
            echo "REMOTE_URLS_VERIFIED:"
            echo "${REMOTE_URLS_VERIFIED:-NO}"
            echo
            echo "Customer install command:"
            echo "curl -fsSL https://raw.githubusercontent.com/reachfm/orvix/main/release/install-public.sh | sudo bash"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "LOCAL_SHA=${LOCAL_SHA:-}"
          echo "REMOTE_SHA=${REMOTE_SHA:-}"
          echo "SHA_MATCH=${SHA_MATCH:-NO}"
          echo "ASSETS_UPLOADED=${ASSETS_UPLOADED:-NO}"
          echo "REMOTE_URLS_VERIFIED=${REMOTE_URLS_VERIFIED:-NO}"
          echo "FINAL_VERDICT=$VERDICT"

          if [ "$VERDICT" != "PASS" ]; then
            echo "Release bundle workflow failed at: $FAILED" >&2
            exit 1
          fi
