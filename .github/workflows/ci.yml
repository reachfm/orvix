name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go fmt ./...
      - run: go vet ./...
      - run: go test ./... -count=1
      - run: go build -o orvix ./cmd/orvix
      - run: cd web && npm install && npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t orvixemail/orvix:latest .
      - run: docker tag orvixemail/orvix:latest orvixemail/orvix:${{ github.sha }}
