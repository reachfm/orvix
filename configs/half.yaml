# Orvix Enterprise Mail Configuration
# orvix.yaml -- Single source of truth for OrvixEM runtime configuration
# Domain: orvix.email | Product: OrvixEM | Binary: orvix

server:
  listen: ":8080"
  trusted_cidr: "0.0.0.0/0"
  debug: false

database:
  driver: "sqlite"
  dsn: "orvix.db?_journal_mode=WAL&_busy_timeout=5000"
  # For PostgreSQL:
  # driver: "postgres"
  # dsn: "host=localhost user=orvix password=orvix dbname=orvix port=5432 sslmode=disable"

redis:
  address: "localhost:6379"
  password: ""
  db: 0

stalwart:
  config_path: "/etc/stalwart/config.yaml"
  binary_path: "/usr/local/bin/stalwart"
  admin_port: 8081
  admin_username: "admin"
  admin_password: ""
  smtp_ports: [25, 587, 465]
  imap_ports: [143, 993]
  pop3_ports: [110, 995]
  jmap_ports: [80, 443]
  health_interval: 60

license:
  public_key_path: "/etc/orvix/license.pub"
  server_url: "https://license.orvix.email"
  offline_grace_days: 7
  hardware_bi
